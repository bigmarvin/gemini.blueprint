#
# Properties file indicating the boot (or mandatory) bundles that are loaded
# by the testing framework.
#
# Normally, this file should not be edited since it is used by the testing infrastructure.
# Users that want to install bundles before starting a test, should use #bundles() method.
#

# elements that have to be ignored should star with
# ignore

# Note: inner placeholders are not supported.

#
# common properties
#

# versioning
ignore.junit.version=4.13.2
ignore.logback.version=1.5.16

ignore.spring.version=${spring.maven.artifact.version}
ignore.gemini.blueprint.version=${project.version}
ignore.slf4j.version=2.0.16
ignore.assertj.version=3.6.2

# groupIds
ignore.spring.groupId=org.springframework
ignore.gemini.blueprint.groupId=org.eclipse.gemini.blueprint
ignore.slf4j.groupId=org.slf4j
ignore.logback.groupId=ch.qos.logback
ignore.wrapped.groupId=org.eclipse.gemini.blueprint.iandt

#
# actual libraries
#
# listed in dependency order to ease deployment

# ASM (required by SPI Fly for bytecode weaving)
org.ow2.asm,asm,9.7.1=
org.ow2.asm,asm-tree,9.7.1=
org.ow2.asm,asm-analysis,9.7.1=
org.ow2.asm,asm-commons,9.7.1=
org.ow2.asm,asm-util,9.7.1=

# Apache Aries SPI Fly: bridges java.util.ServiceLoader with OSGi's module system.
# SLF4J 2.x and Logback use ServiceLoader to find each other, which doesn't work
# across OSGi bundle classloaders. SPI Fly weaves the calling bundle's bytecode to
# set the TCCL before ServiceLoader.load() calls, making cross-bundle discovery work.
# Must be installed before SLF4J and Logback.
org.apache.aries.spifly,org.apache.aries.spifly.dynamic.bundle,1.3.7=

# SLF4J and Logback (have OSGi metadata, installed as bundles with SPI Fly mediation)
${ignore.slf4j.groupId},slf4j-api,${ignore.slf4j.version}=
${ignore.logback.groupId},logback-core,${ignore.logback.version}=
${ignore.logback.groupId},logback-classic,${ignore.logback.version}=

# JUnit and Hamcrest wrapped as OSGi bundles (originals lack OSGi metadata).
# Spring and commons-logging also wrapped (Spring 7 dropped OSGi metadata).
# AssertJ already has OSGi metadata and is installed directly.
# See integration-tests/wrapped-jars/ for wrapper modules.
${ignore.wrapped.groupId},hamcrest-core-osgi,${ignore.gemini.blueprint.version}=
${ignore.wrapped.groupId},junit-osgi,${ignore.gemini.blueprint.version}=
org.assertj,assertj-core,${ignore.assertj.version}=
${ignore.wrapped.groupId},commons-logging-osgi,${ignore.gemini.blueprint.version}=
${ignore.wrapped.groupId},spring-core-osgi,${ignore.gemini.blueprint.version}=
${ignore.wrapped.groupId},spring-beans-osgi,${ignore.gemini.blueprint.version}=
${ignore.wrapped.groupId},spring-aop-osgi,${ignore.gemini.blueprint.version}=
${ignore.wrapped.groupId},spring-expression-osgi,${ignore.gemini.blueprint.version}=
${ignore.wrapped.groupId},spring-context-osgi,${ignore.gemini.blueprint.version}=
${ignore.wrapped.groupId},spring-test-osgi,${ignore.gemini.blueprint.version}=

# gemini blueprint libs
${ignore.gemini.blueprint.groupId},gemini-blueprint-io,${ignore.gemini.blueprint.version}=
${ignore.gemini.blueprint.groupId},gemini-blueprint-core,${ignore.gemini.blueprint.version}=
${ignore.gemini.blueprint.groupId},gemini-blueprint-extender,${ignore.gemini.blueprint.version}=
${ignore.gemini.blueprint.groupId},gemini-blueprint-test,${ignore.gemini.blueprint.version}=
